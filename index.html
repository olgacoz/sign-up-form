<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign-up Form</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div>
    <img src="images/beach.jpg" alt="Beach photo"
    >
    <div>
      <img src="images/nomad.svg" alt="Man with laptop">
      <h1>NOMADS</h1>
    </div>
  </div>

  <p>
    This is not a real online service! You know you need something like this in your life to help you realize your
    deepest dreams.<br>Sign up now to get started.<br><br>You know you want to.
  </p>

  <form>
    <p>Let's do this!</p>

    <label for="fname">FIRST NAME</label>
    <input type="text" name="first_name" id="fname">

    <div>
      <label for="lname">LAST NAME</label>
      <input type="text" name="last_name" id="lname">
    </div>

    <div>
      <label for="email">EMAIL</label>
      <input type="email" name="email" id="email">
    </div>
    <div>
      <label for="phone">PHONE NUMBER</label>
      <input type="tel" name="phone_number" id="phone">
    </div>
    <div>
      <label for="password1">PASSWORD</label>
      <input type="password" name="password" id="password1">
    </div>
    <div>
      <label for="password2">CONFIRM PASSWORD</label>
      <input type="password" name="confirm_password" id="password2">
    </div>
    <div>
      <button type="submit">Create Account</button>
      <p>Already have an account? <a href="/">Log in</a></p>
    </div>
  </form>

</body>

</html>
